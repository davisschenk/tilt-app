networks:
  cloudflare:
    external: true

volumes:
  pgdata:
  uploads:

services:
  db:
    image: postgres:16-alpine
    labels:
      komodo.stack: apps
      komodo.service: tilt-db
    environment:
      POSTGRES_DB: tilt
      POSTGRES_USER: tilt
      POSTGRES_PASSWORD: ${TILT_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tilt -d tilt"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    labels:
      komodo.stack: apps
      komodo.service: tilt
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tilt:${TILT_DB_PASSWORD}@db:5432/tilt
      ROCKET_PORT: "8000"
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_SECRET_KEY: ${TILT_ROCKET_SECRET_KEY}
      RUST_LOG: info
      UPLOAD_DIR: /app/uploads
      AUTHENTIK_ISSUER_URL: https://auth.schenkenberger.dev/application/o/tilt/
      AUTHENTIK_CLIENT_ID: ${TILT_AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${TILT_AUTHENTIK_CLIENT_SECRET}
      AUTHENTIK_REDIRECT_URL: https://tilt.schenkenberger.dev/api/v1/auth/callback
      FRONTEND_URL: https://tilt.schenkenberger.dev
      FRONTEND_URL_POST_LOGIN: https://tilt.schenkenberger.dev
      OTA_FIRMWARE_VERSION: 0.0.0
      OTA_FIRMWARE_URL: https://github.com/davisschenk/tilt-app/releases/download/0.0.0/esp32-client
    volumes:
      - uploads:/app/uploads
    networks:
      - cloudflare
