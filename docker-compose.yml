name: tilt-${COMPOSE_PROJECT_NAME:-main}

services:
  db:
    image: postgres:16-alpine
    labels:
      com.tilt.stack: "${COMPOSE_PROJECT_NAME:-main}"
    environment:
      POSTGRES_DB: ${DB_NAME:-tilt}
      POSTGRES_USER: ${DB_USER:-tilt}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tilt} -d ${DB_NAME:-tilt}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    labels:
      com.tilt.stack: "${COMPOSE_PROJECT_NAME:-main}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      AUTH_MODE: ${AUTH_MODE:-disabled}
      DATABASE_URL: postgres://${DB_USER:-tilt}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-tilt}
      ROCKET_PORT: "8000"
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_SECRET_KEY: ${ROCKET_SECRET_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
      UPLOAD_DIR: /app/uploads
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  uploads:
