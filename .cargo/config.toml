# Cross-compilation linker for Raspberry Pi Zero W (armv6l, hard-float)
# Used when building natively (without the `cross` tool)
[target.arm-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

# NOTE: target-dir is now per-worktree, set via CARGO_TARGET_DIR in each
# worktree's .env (see WORKTREES.md). The previous hard-coded path was
# user-specific and caused build-lock contention across worktrees.
