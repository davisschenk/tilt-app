# Cross-compilation linker for Raspberry Pi Zero W (armv6l, hard-float)
# Used when building natively (without the `cross` tool)
[target.arm-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

# Shared build cache across git worktrees.
# All worktrees write to the main worktree's target/ so incremental builds are fast.
# Override per-worktree by setting CARGO_TARGET_DIR in the worktree's .env or shell.
[build]
target-dir = "/home/davis/tilt-app/target"
