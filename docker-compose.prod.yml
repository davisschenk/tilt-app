volumes:
  pgdata:
  uploads:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tilt
      POSTGRES_USER: tilt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tilt -d tilt"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://tilt:${DB_PASSWORD}@db:5432/tilt
      ROCKET_PORT: "8000"
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_SECRET_KEY: ${ROCKET_SECRET_KEY}
      RUST_LOG: ${RUST_LOG:-info}
      UPLOAD_DIR: /app/uploads
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
